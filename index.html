<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Alérgenos | Casa Kiki</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#fff;--text:#1f2937;--muted:#6b7280;--main:#0f75a8;--danger:#fee2e2;--danger-b:#dc2626;--warn:#fef3c7;--warn-b:#d97706;--ok:#dcfce7;--ok-b:#16a34a;--line:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(135deg,#0f75a8,#063d5c);color:white;padding:28px 18px;text-align:center}
    header h1{margin:0;font-size:30px} header p{margin:8px 0 0;opacity:.9}
    main{max-width:1100px;margin:0 auto;padding:22px}
    .panel{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 25px rgba(0,0,0,.08);margin-bottom:18px}
    .row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
    input{width:100%;font-size:18px;padding:15px;border:2px solid var(--line);border-radius:12px;outline:none} input:focus{border-color:var(--main)}
    button{border:0;background:var(--main);color:white;padding:14px 18px;border-radius:12px;font-size:16px;cursor:pointer}button:hover{filter:brightness(.95)}
    .status{font-size:14px;color:var(--muted);margin-top:10px}.error{color:#b91c1c;font-weight:bold}.success{color:#166534}
    .suggestions{margin-top:12px;display:grid;gap:8px}.suggestion{padding:12px;border:1px solid var(--line);border-radius:10px;background:#fafafa;cursor:pointer}.suggestion:hover{background:#eef6fb;border-color:#9bd1ec}
    .product-title{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}.product-title h2{margin:0;font-size:25px}.badge{font-size:13px;border-radius:999px;padding:6px 10px;background:#eef2ff;color:#3730a3;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.box{border-radius:14px;padding:16px;border:1px solid var(--line)}.box h3{margin:0 0 10px}.contains{background:var(--danger);border-color:#fecaca}.traces{background:var(--warn);border-color:#fde68a}.free{background:var(--ok);border-color:#bbf7d0}.pillwrap{display:flex;flex-wrap:wrap;gap:8px}.pill{font-weight:bold;padding:8px 10px;border-radius:999px;background:white;border:1px solid rgba(0,0,0,.1)}
    .notes{margin-top:14px;padding:14px;border-left:5px solid var(--main);background:#f8fafc;border-radius:10px}.small{font-size:13px;color:var(--muted)}
    footer{text-align:center;color:var(--muted);font-size:13px;padding:15px 20px 30px}
    @media(max-width:760px){.row{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.product-title{display:block}.badge{display:inline-block;margin-top:8px}header h1{font-size:24px}}
  </style>
</head>
<body>
<header>
  <h1>Buscador de Alérgenos</h1>
  <p>Casa Kiki · Consulta de alérgenos y posibles trazas</p>
</header>
<main>
  <section class="panel">
    <div class="row">
      <input id="search" type="text" placeholder="Escribe el nombre del producto..." autocomplete="off" />
      <button onclick="loadData(true)">Actualizar datos</button>
    </div>
    <div id="status" class="status">Cargando datos desde Google Sheets...</div>
    <div id="suggestions" class="suggestions"></div>
  </section>
  <section id="result"></section>
</main>
<footer>La información se toma directamente de la hoja publicada de Google Sheets. Revise siempre la ficha técnica ante dudas.</footer>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTy0R-i-W28iW5aOmO5c3K8ryVNWqoIgZrQWNbQqnQ6HFAlZw-V38dcsxyx5FFktQ/pub?gid=1520357358&single=true&output=csv";
const ALLERGEN_START_COL = 2; // 0=Producto, 1=Alérgenos Contenido, desde 2 columnas de alérgenos
let products = [];
let headers = [];

function normalize(txt){return String(txt||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();}
function esc(txt){return String(txt??"").replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[m]));}
function parseCSV(text){
  const rows=[]; let row=[], cell='', inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(inQuotes && n==='"'){cell+='"';i++;} else inQuotes=!inQuotes;
    } else if(c===',' && !inQuotes){row.push(cell);cell='';
    } else if((c==='\n'||c==='\r') && !inQuotes){
      if(c==='\r' && n==='\n') i++;
      row.push(cell); if(row.some(v=>String(v).trim()!=='')) rows.push(row); row=[]; cell='';
    } else cell+=c;
  }
  row.push(cell); if(row.some(v=>String(v).trim()!=='')) rows.push(row);
  return rows;
}
function analyzeRow(row){
  const present=[], traces=[];
  for(let i=ALLERGEN_START_COL;i<headers.length;i++){
    const allergen=(headers[i]||'').trim(); if(!allergen) continue;
    const value=normalize(row[i]);
    if(value.includes('puede contener')) traces.push(allergen);
    else if(value.includes('contiene')) present.push(allergen);
  }
  return {present,traces};
}
async function loadData(manual=false){
  const status=document.getElementById('status');
  status.className='status'; status.textContent='Cargando datos desde Google Sheets...';
  try{
    const url=CSV_URL + '&t=' + Date.now();
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length<2) throw new Error('La hoja no tiene datos suficientes');
    headers=rows[0].map(h=>String(h||'').trim());
    products=rows.slice(1).map((row,idx)=>{
      const a=analyzeRow(row);
      return {id:idx,nombre:String(row[0]||'').trim(),contenido:String(row[1]||'').trim(),observaciones:String(row[18]||'').trim(), present:a.present, traces:a.traces, raw:row};
    }).filter(p=>p.nombre);
    status.className='status success';
    status.textContent=`Datos cargados correctamente: ${products.length} productos.`;
    if(manual) searchNow();
  }catch(e){
    status.className='status error';
    status.innerHTML='No se han podido cargar los datos desde Google Sheets. Detalle: '+esc(e.message)+'<br>Cuando esté subido a GitHub Pages debería funcionar con esta misma versión.';
  }
}
function searchNow(){
  const q=normalize(document.getElementById('search').value);
  const sug=document.getElementById('suggestions'); const res=document.getElementById('result');
  sug.innerHTML=''; res.innerHTML='';
  if(!q){return;}
  const matches=products.filter(p=>normalize(p.nombre).includes(q) || normalize(p.contenido).includes(q)).slice(0,12);
  if(matches.length===0){sug.innerHTML='<div class="suggestion">No se ha encontrado ningún producto.</div>';return;}
  if(matches.length===1 || normalize(matches[0].nombre)===q){showProduct(matches[0]);return;}
  sug.innerHTML=matches.map(p=>`<div class="suggestion" onclick="selectProduct(${p.id})"><b>${esc(p.nombre)}</b><br><span class="small">${esc(p.contenido||'')}</span></div>`).join('');
}
function selectProduct(id){const p=products.find(x=>x.id===id); if(p){document.getElementById('search').value=p.nombre;document.getElementById('suggestions').innerHTML='';showProduct(p);}}
function pills(arr){return arr.length?`<div class="pillwrap">${arr.map(x=>`<span class="pill">${esc(x)}</span>`).join('')}</div>`:'<span class="small">No constan.</span>';}
function showProduct(p){
  document.getElementById('result').innerHTML=`<div class="panel"><div class="product-title"><div><h2>${esc(p.nombre)}</h2><div class="small">${esc(p.contenido||'')}</div></div><span class="badge">Producto</span></div><div class="grid"><div class="box contains"><h3>Alérgenos presentes</h3>${pills(p.present)}</div><div class="box traces"><h3>Puede contener trazas</h3>${pills(p.traces)}</div></div>${p.present.length===0&&p.traces.length===0?'<div class="box free" style="margin-top:14px"><h3>Sin alérgenos declarados</h3><span class="small">No aparecen alérgenos ni trazas en las columnas revisadas.</span></div>':''}${p.observaciones?`<div class="notes"><b>Observaciones:</b><br>${esc(p.observaciones)}</div>`:''}<p class="small">Criterio: “Contiene” = presencia del alérgeno. “Puede contener trazas” = posible presencia por trazas.</p></div>`;
}
document.getElementById('search').addEventListener('input', searchNow);
loadData(false);
</script>
</body>
</html>
